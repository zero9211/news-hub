name: PodcastAI
options:
  bundleIdPrefix: com.podcastai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    INFOPLIST_FILE: PodcastAI/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.podcastai.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""   # ← fill in your Apple Team ID

targets:
  PodcastAI:
    type: application
    platform: iOS
    sources:
      - PodcastAI
    settings:
      base:
        INFOPLIST_FILE: PodcastAI/Info.plist
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: Speech.framework
