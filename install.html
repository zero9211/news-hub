<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PodcastAI 安装</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #000; color: #fff;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; gap: 20px;
  }
  .icon { font-size: 64px; }
  h1 { font-size: 24px; font-weight: 700; }
  .sub { font-size: 15px; color: #888; text-align: center; line-height: 1.5; }
  .btn {
    width: 100%; max-width: 320px;
    padding: 16px; border-radius: 14px;
    font-size: 17px; font-weight: 600;
    border: none; cursor: pointer;
    text-decoration: none; text-align: center; display: block;
  }
  #btn-lc { background: #0a84ff; color: #fff; }
  #btn-dl { background: #1c1c1e; color: #0a84ff; font-size: 15px; padding: 12px; }
  .btn:active { opacity: 0.75; }
  #status { font-size: 13px; color: #555; text-align: center; }
</style>
</head>
<body>
  <div class="icon">🎙</div>
  <h1>PodcastAI</h1>
  <p class="sub" id="sub">正在获取最新版本…</p>

  <a class="btn" id="btn-lc" href="#">一键安装到 LiveContainer</a>
  <a class="btn" id="btn-dl" href="#" style="display:none">仅下载 IPA</a>
  <p id="status"></p>

  <script>
    const REPO  = 'zero9211/news-hub';
    const ASSET = 'PodcastAI-unsigned.ipa';
    const IPA_URL = `https://github.com/${REPO}/releases/download/ios-latest/${ASSET}`;
    const LC_URL  = 'livecontainer://install?url=' + encodeURIComponent(IPA_URL);

    const btnLC = document.getElementById('btn-lc');
    const btnDL = document.getElementById('btn-dl');
    const sub   = document.getElementById('sub');
    const status = document.getElementById('status');

    // 设置 LiveContainer 直接安装链接（固定 URL，不需要 API）
    btnLC.href = LC_URL;
    btnDL.href = IPA_URL;
    btnDL.style.display = 'block';
    btnDL.download = ASSET;

    // 尝试从 API 获取 build 号和文件大小（可选，失败不影响安装）
    fetch(`https://api.github.com/repos/${REPO}/releases/tags/ios-latest`,
          { headers: { Accept: 'application/vnd.github+json' } })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) { sub.textContent = '点下方按钮安装'; return; }
        const asset   = data.assets?.find(a => a.name === ASSET);
        const build   = data.name?.match(/build (\d+)/)?.[1] ?? '';
        const sizeMB  = asset ? (asset.size / 1024 / 1024).toFixed(1) + ' MB' : '';
        sub.textContent = [build && `Build ${build}`, sizeMB].filter(Boolean).join(' · ');
      })
      .catch(() => { sub.textContent = '点下方按钮安装'; });
  </script>
</body>
</html>
