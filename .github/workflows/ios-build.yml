name: Build iOS IPA

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/PodcastAI
        run: xcodegen generate

      - name: Build (unsigned)
        working-directory: ios/PodcastAI
        run: |
          xcodebuild \
            -project PodcastAI.xcodeproj \
            -scheme PodcastAI \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build

      - name: Package IPA
        working-directory: ios/PodcastAI
        run: |
          mkdir -p Payload
          cp -r build/PodcastAI.app Payload/
          zip -r PodcastAI-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PodcastAI-unsigned-ipa
          path: ios/PodcastAI/PodcastAI-unsigned.ipa
          retention-days: 30
