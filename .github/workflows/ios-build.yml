name: Build iOS IPA

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/PodcastAI
        run: xcodegen generate

      - name: List schemes
        working-directory: ios/PodcastAI
        run: xcodebuild -project PodcastAI.xcodeproj -list

      - name: Build (ad-hoc signed)
        working-directory: ios/PodcastAI
        run: |
          xcodebuild \
            -project PodcastAI.xcodeproj \
            -scheme PodcastAI \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build_output" \
            clean build \
            2>&1 | tail -50

      - name: Find .app
        working-directory: ios/PodcastAI
        run: find build_output -name "*.app" -type d

      - name: Package IPA
        working-directory: ios/PodcastAI
        run: |
          APP=$(find build_output -name "PodcastAI.app" -type d | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r PodcastAI-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PodcastAI-unsigned-ipa
          path: ios/PodcastAI/PodcastAI-unsigned.ipa
          retention-days: 30
