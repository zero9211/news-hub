name: Build iOS IPA

on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/PodcastAI
        run: xcodegen generate

      - name: Build (unsigned)
        working-directory: ios/PodcastAI
        run: |
          BUILD_DIR="$PWD/build_output"
          mkdir -p "$BUILD_DIR"

          xcodebuild \
            -project PodcastAI.xcodeproj \
            -scheme PodcastAI \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            BUILD_DIR="$BUILD_DIR" \
            clean build

          echo "--- build output ---"
          find "$BUILD_DIR" -name "*.app" | head -10

      - name: Package IPA
        working-directory: ios/PodcastAI
        run: |
          APP=$(find build_output -name "PodcastAI.app" | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r PodcastAI-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PodcastAI-unsigned-ipa
          path: ios/PodcastAI/PodcastAI-unsigned.ipa
          retention-days: 30
